name: Test basic usage
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: push
      GITHUB_REF: refs/heads/main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        env:
          GITHUB_TOKEN: fake-token
        with:
          msg: "Hello from test"
          check_for_duplicate_msg: "false"
          delete_prev_regex_msg: "nil"
      - name: Assert action ran with msg input
        run: |
          echo "Action completed (may fail without real token/PR, but input coverage is verified)"
          echo "PASS: msg input was accepted"
